name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, test, schema-drift, examples
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev --frozen || uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pytest
        run: uv run pytest

      - name: Export schemas and check no drift
        run: |
          uv run python scripts/export_schemas.py
          uv run python scripts/export_case_views.py
          if ! git diff --quiet -- schemas/json docs/workflows/case-model.md; then
            echo "::error::Generated schemas/docs are out of date. Run scripts/export_schemas.py and scripts/export_case_views.py and commit the result."
            git diff -- schemas/json docs/workflows/case-model.md
            exit 1
          fi

      - name: Validate examples
        run: uv run python scripts/validate_examples.py
